name:  Pipeline de Orquestração Horária (DB Local)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  executar_pipeline_e_commit:
    runs-on: ubuntu-latest
    
    # --- NOVO BLOCO DE PERMISSÕES ADICIONADO AQUI ---
    permissions:
      contents: write # ESSENCIAL: Permite que o bot comite e faça push
    
    timeout-minutes: 30
    
    steps:
      - name: 📦 Checkout do Código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
          
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Instalar Dependências
        run: pip install -r requirements.txt
        
      - name:  Executar o Orquestrador Principal
        env:
          CHAT_WEBHOOK_URL_SAURON: ${{ secrets.CHAT_WEBHOOK_URL_SAURON }}
          CHAT_WEBHOOK_URL_MUNIN: ${{ secrets.CHAT_WEBHOOK_URL_MUNIN }}
          CHAT_WEBHOOK_URL_HALL: ${{ secrets.CHAT_WEBHOOK_URL_HALL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          CHAT_TIMEOUT: 8 
          
        run: python executar_tudo.py
        
      # --- Bloco de Commit e Push dos DBs ---
      - name:  Configurar Git para o Commit
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
      - name: Fazer Commit e Push dos DBs Atualizados
        run: |
          DB_FOLDER="data/"
          git add $DB_FOLDER 
          COMMIT_MSG=" [Automático] DBs em 'data/' atualizados por Pipeline horária."
          
          if ! git diff --cached --exit-code; then
            echo "Fazendo commit das alterações nos DBs..."
            git commit -m "$COMMIT_MSG"
            git push
            echo "Push concluído com sucesso."
          else
            echo "Nenhuma alteração detectada. Pulando commit/push."
          fi
